<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Online — Lobby Host</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6D28D9",
                        "primary-container": "#5B21B6",
                        "on-primary": "#FFFFFF",
                        "on-primary-container": "#dac5ff",
                        "secondary": "#831ada",
                        "on-secondary": "#ffffff",
                        "secondary-container": "#9e41f5",
                        "bg": "#F8FAFC",
                        "background": "#fef7ff",
                        "surface": "#FFFFFF",
                        "surface-muted": "#F1F5F9",
                        "surface-dim": "#dfd7e5",
                        "surface-bright": "#fef7ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f9f1ff",
                        "surface-container": "#f3ebf9",
                        "surface-container-high": "#ede5f3",
                        "surface-container-highest": "#e8e0ee",
                        "surface-variant": "#e8e0ee",
                        "on-surface": "#1d1a24",
                        "on-surface-variant": "#4a4455",
                        "inverse-surface": "#332f39",
                        "inverse-on-surface": "#f6eefc",
                        "outline": "#7b7486",
                        "outline-variant": "#ccc3d7",
                        "border": "#E2E8F0",
                        "text-strong": "#0F172A",
                        "text-muted": "#64748B",
                        "on-background": "#1d1a24",
                        "primary-fixed": "#ebddff",
                        "primary-fixed-dim": "#d3bbff",
                        "inverse-primary": "#d3bbff",
                        "success": "#16A34A",
                        "warning": "#D97706",
                        "info": "#2563EB",
                        "error": "#DC2626",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "on-error-container": "#93000a",
                        "answer-red": "#E21B3C",
                        "answer-blue": "#1368CE",
                        "answer-yellow": "#D89E00",
                        "answer-green": "#26890C",
                        "podium-gold": "#FBBF24",
                        "podium-silver": "#CBD5E1",
                        "podium-bronze": "#D97706"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "scale-base": "4px",
                        "gutter": "16px",
                        "margin-mobile": "12px",
                        "container-host": "896px",
                        "container-form": "512px"
                    },
                    fontFamily: {
                        "display": ["Poppins"],
                        "display-xl": ["Poppins"],
                        "display-xl-mobile": ["Poppins"],
                        "headline-1": ["Poppins"],
                        "headline-2": ["Poppins"],
                        "poppins": ["Poppins"],
                        "body": ["Inter"],
                        "label": ["Inter"],
                        "caption": ["Inter"]
                    },
                    fontSize: {
                        "display-xl": ["60px", {"lineHeight": "60px", "letterSpacing": "0.025em", "fontWeight": "800"}],
                        "display-xl-mobile": ["48px", {"lineHeight": "48px", "fontWeight": "800"}],
                        "display": ["36px", {"lineHeight": "40px", "fontWeight": "700"}],
                        "headline-1": ["24px", {"lineHeight": "30px", "fontWeight": "700"}],
                        "headline-2": ["20px", {"lineHeight": "26px", "fontWeight": "600"}],
                        "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                        "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        /* Immersive gameplay background (lobby, gameplay, results, join, participant screens) */
        .hero-gradient { background: linear-gradient(135deg, #6D28D9 0%, #9333EA 50%, #DB2777 100%); }
    </style>
    <!-- Screen-specific styles -->
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined.fill { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 24; }
        @keyframes chipPop {
            0%   { opacity: 0; transform: scale(0.6) translateY(10px); }
            60%  { opacity: 1; transform: scale(1.08) translateY(0); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .chip-pop { animation: chipPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1) backwards; }
    </style>
</head>
<body>
    <div class="hero-gradient min-h-dvh flex flex-col text-white">

        <!-- Top row: brand + exit -->
        <header class="flex items-center justify-between px-6 py-5 md:px-10">
            <div class="flex items-center gap-2">
                <span class="material-symbols-outlined fill text-2xl">stadia_controller</span>
                <span class="font-display font-bold text-xl tracking-tight">Quiz Online</span>
            </div>
            <button onclick="window.location.href='../host_dashboard_no_sidebar/code.html'" class="flex items-center gap-2 rounded-xl px-4 py-2 min-h-[44px] font-semibold text-white/90 hover:bg-white/15 transition-colors">
                <span class="material-symbols-outlined text-xl">logout</span>
                Keluar
            </button>
        </header>

        <!-- Center: PIN panel -->
        <main class="flex-1 flex flex-col items-center justify-center px-6 py-8 gap-10">

            <div class="flex flex-col items-center gap-5">
                <!-- Signature PIN display -->
                <div class="bg-surface rounded-2xl shadow-2xl px-10 py-7 md:px-16 md:py-9 text-center">
                    <p class="text-text-muted text-sm md:text-base font-semibold uppercase tracking-[0.3em] mb-2">Game PIN</p>
                    <p class="font-display-xl text-text-strong text-primary text-7xl md:text-8xl lg:text-9xl font-extrabold tracking-wide tabular-nums leading-none">482 137</p>
                </div>
                <p class="text-white/90 text-base md:text-xl font-medium text-center max-w-xl">
                    Buka Quiz Online di HP-mu &amp; masukkan PIN ini untuk bergabung
                </p>
            </div>

            <!-- Live participants -->
            <section class="w-full max-w-4xl flex flex-col items-center gap-4">
                <div class="flex items-center gap-2 text-white">
                    <span class="material-symbols-outlined fill text-2xl md:text-3xl">group</span>
                    <span id="playerCount" class="font-display font-bold text-2xl md:text-3xl tabular-nums">18 pemain</span>
                </div>

                <div id="participantList" class="flex flex-wrap justify-center gap-3 max-w-3xl">
                    <!-- chips injected by JS -->
                </div>
            </section>
        </main>

        <!-- Bottom: Start -->
        <footer class="px-6 pb-10 pt-4 flex justify-center">
            <!-- NOTE: "Mulai" must be disabled (add: opacity-50 cursor-not-allowed, and disabled attr) until at least 1 player has joined. -->
            <button onclick="window.location.href='../host_game_screen/code.html'" class="bg-primary text-white rounded-xl px-12 py-4 min-h-[44px] font-semibold text-xl md:text-2xl shadow-sm hover:bg-primary-container transition-colors flex items-center gap-3">
                <span class="material-symbols-outlined fill text-2xl md:text-3xl">play_arrow</span>
                Mulai
            </button>
        </footer>
    </div>

    <script>
        const nicknames = [
            "RubahCepat", "SiPintar", "Budi99", "QueenBee", "Petir",
            "Naga", "Kiki", "MacanTutul", "Zahra_07", "BocahApi",
            "RajaKuis", "MelatiX", "GledekZeus", "Ucok", "Pinguin",
            "DewiSakti", "Topan", "BintangJatuh"
        ];

        const list = document.getElementById("participantList");
        nicknames.forEach((name, i) => {
            const chip = document.createElement("span");
            chip.className = "chip-pop rounded-full bg-white/20 backdrop-blur px-4 py-2 font-semibold text-white text-sm md:text-base whitespace-nowrap";
            chip.style.animationDelay = (i * 0.07) + "s";
            chip.textContent = name;
            list.appendChild(chip);
        });

        document.getElementById("playerCount").textContent = nicknames.length + " pemain";
    </script>
</body>
</html>
