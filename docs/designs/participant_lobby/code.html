<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Online — Ruang Tunggu Pemain</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#6D28D9",
                    "primary-container": "#5B21B6",
                    "on-primary": "#FFFFFF",
                    "on-primary-container": "#dac5ff",
                    "secondary": "#831ada",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#9e41f5",
                    "bg": "#F8FAFC",
                    "background": "#fef7ff",
                    "surface": "#FFFFFF",
                    "surface-muted": "#F1F5F9",
                    "surface-dim": "#dfd7e5",
                    "surface-bright": "#fef7ff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#f9f1ff",
                    "surface-container": "#f3ebf9",
                    "surface-container-high": "#ede5f3",
                    "surface-container-highest": "#e8e0ee",
                    "surface-variant": "#e8e0ee",
                    "on-surface": "#1d1a24",
                    "on-surface-variant": "#4a4455",
                    "inverse-surface": "#332f39",
                    "inverse-on-surface": "#f6eefc",
                    "outline": "#7b7486",
                    "outline-variant": "#ccc3d7",
                    "border": "#E2E8F0",
                    "text-strong": "#0F172A",
                    "text-muted": "#64748B",
                    "on-background": "#1d1a24",
                    "primary-fixed": "#ebddff",
                    "primary-fixed-dim": "#d3bbff",
                    "inverse-primary": "#d3bbff",
                    "success": "#16A34A",
                    "warning": "#D97706",
                    "info": "#2563EB",
                    "error": "#DC2626",
                    "on-error": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-error-container": "#93000a",
                    "answer-red": "#E21B3C",
                    "answer-blue": "#1368CE",
                    "answer-yellow": "#D89E00",
                    "answer-green": "#26890C",
                    "podium-gold": "#FBBF24",
                    "podium-silver": "#CBD5E1",
                    "podium-bronze": "#D97706"
                },
                borderRadius: {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1rem",
                    "full": "9999px"
                },
                spacing: {
                    "scale-base": "4px",
                    "gutter": "16px",
                    "margin-mobile": "12px",
                    "container-host": "896px",
                    "container-form": "512px"
                },
                fontFamily: {
                    "display": ["Poppins"],
                    "display-xl": ["Poppins"],
                    "display-xl-mobile": ["Poppins"],
                    "headline-1": ["Poppins"],
                    "headline-2": ["Poppins"],
                    "poppins": ["Poppins"],
                    "body": ["Inter"],
                    "label": ["Inter"],
                    "caption": ["Inter"]
                },
                fontSize: {
                    "display-xl": ["60px", {"lineHeight": "60px", "letterSpacing": "0.025em", "fontWeight": "800"}],
                    "display-xl-mobile": ["48px", {"lineHeight": "48px", "fontWeight": "800"}],
                    "display": ["36px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "headline-1": ["24px", {"lineHeight": "30px", "fontWeight": "700"}],
                    "headline-2": ["20px", {"lineHeight": "26px", "fontWeight": "600"}],
                    "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}]
                }
            }
        }
    }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    /* Immersive gameplay background (lobby, gameplay, results, join, participant screens) */
    .hero-gradient { background: linear-gradient(135deg, #6D28D9 0%, #9333EA 50%, #DB2777 100%); }
</style>
<style>
    /* Screen-specific: gentle bounce for the success badge */
    @keyframes badge-bounce {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-10px) scale(1.04); }
    }
    .badge-bounce { animation: badge-bounce 2.2s ease-in-out infinite; }

    /* Decorative floating dots in the background */
    @keyframes dot-pulse {
        0%, 100% { opacity: 0.15; transform: scale(0.9); }
        50% { opacity: 0.45; transform: scale(1.15); }
    }
    .float-dot { animation: dot-pulse 3.5s ease-in-out infinite; }

    /* Animated "..." waiting dots */
    @keyframes wait-dot {
        0%, 80%, 100% { opacity: 0.2; }
        40% { opacity: 1; }
    }
    .wait-dot { animation: wait-dot 1.4s ease-in-out infinite; }
    .wait-dot:nth-child(2) { animation-delay: 0.2s; }
    .wait-dot:nth-child(3) { animation-delay: 0.4s; }

    /* Soft glow behind the badge circle */
    .badge-glow { box-shadow: 0 0 60px 12px rgba(255,255,255,0.25); }

    .material-symbols-fill { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 48; }
</style>
</head>
<body class="font-body antialiased">
    <main class="hero-gradient relative min-h-dvh overflow-hidden flex flex-col items-center justify-center text-on-primary px-6 py-10">

        <!-- Decorative floating dots -->
        <div class="pointer-events-none absolute inset-0 select-none">
            <span class="float-dot absolute top-[12%] left-[14%] h-3 w-3 rounded-full bg-white"></span>
            <span class="float-dot absolute top-[22%] right-[18%] h-2 w-2 rounded-full bg-white" style="animation-delay: 0.6s;"></span>
            <span class="float-dot absolute bottom-[18%] left-[22%] h-4 w-4 rounded-full bg-white" style="animation-delay: 1.1s;"></span>
            <span class="float-dot absolute bottom-[26%] right-[14%] h-2.5 w-2.5 rounded-full bg-white" style="animation-delay: 1.6s;"></span>
            <span class="float-dot absolute top-[44%] left-[8%] h-2 w-2 rounded-full bg-white" style="animation-delay: 0.3s;"></span>
            <span class="float-dot absolute top-[60%] right-[10%] h-3 w-3 rounded-full bg-white" style="animation-delay: 0.9s;"></span>
        </div>

        <div class="relative z-10 flex w-full max-w-sm flex-col items-center text-center">

            <!-- Success badge -->
            <div class="badge-bounce mb-8">
                <div class="badge-glow flex h-32 w-32 items-center justify-center rounded-full bg-white/20 backdrop-blur-sm ring-4 ring-white/30">
                    <span class="material-symbols-outlined material-symbols-fill text-white" style="font-size: 72px;">check_circle</span>
                </div>
            </div>

            <!-- Heading -->
            <h1 class="font-display text-display text-white">Kamu sudah masuk!</h1>

            <!-- Nickname pill -->
            <div class="mt-6 inline-flex items-center gap-2 rounded-full bg-white/20 px-7 py-3 backdrop-blur-md ring-1 ring-white/25">
                <span class="font-display text-headline-1 text-white">🦊 RubahCepat</span>
            </div>

            <!-- Waiting subtext with pulsing dots -->
            <p class="mt-8 flex items-center justify-center font-body text-body text-white/90">
                <span>Menunggu host memulai</span>
                <span class="ml-0.5 inline-flex">
                    <span class="wait-dot">.</span>
                    <span class="wait-dot">.</span>
                    <span class="wait-dot">.</span>
                </span>
            </p>

            <!-- Player order caption -->
            <p class="mt-3 font-caption text-label text-white/70">Kamu pemain ke-18</p>

        </div>
    </main>
</body>
</html>
