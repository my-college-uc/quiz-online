<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    /* Immersive gameplay background (lobby, gameplay, results, join, participant screens) */
    .hero-gradient { background: linear-gradient(135deg, #6D28D9 0%, #9333EA 50%, #DB2777 100%); }

    /* Screen-specific styles */
    .icon-fill { font-variation-settings: 'FILL' 1, 'wght' 600, 'GRAD' 0, 'opsz' 48; }
    .success-gradient { background: linear-gradient(160deg, #16A34A 0%, #15803D 60%, #166534 100%); }

    @keyframes pop-in {
        0%   { transform: scale(0.3); opacity: 0; }
        60%  { transform: scale(1.12); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop { animation: pop-in 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    @keyframes gentle-bounce {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-6px); }
    }
    .animate-gentle { animation: gentle-bounce 2.4s ease-in-out 0.6s infinite; }

    @keyframes rise {
        from { transform: translateY(16px); opacity: 0; }
        to   { transform: translateY(0); opacity: 1; }
    }
    .animate-rise { animation: rise 0.5s ease-out both; }
    .delay-1 { animation-delay: 0.20s; }
    .delay-2 { animation-delay: 0.35s; }
    .delay-3 { animation-delay: 0.50s; }

    @keyframes pulse-soft {
        0%, 100% { opacity: 0.7; }
        50%      { opacity: 1; }
    }
    .animate-pulse-soft { animation: pulse-soft 1.8s ease-in-out infinite; }
</style>
</head>
<body class="h-full success-gradient text-on-primary antialiased">

    <!-- PARTICIPANT — Per-Question Result (CORRECT variant) -->
    <main class="min-h-dvh flex flex-col items-center justify-center px-margin-mobile py-10 text-center select-none">

        <!-- Check icon in white/20 circle -->
        <div class="animate-pop mb-6">
            <div class="animate-gentle w-28 h-28 rounded-full bg-white/20 ring-4 ring-white/25 flex items-center justify-center shadow-2xl shadow-black/20">
                <span class="material-symbols-outlined icon-fill text-white" style="font-size: 72px;">check</span>
            </div>
        </div>

        <!-- Heading -->
        <h1 class="font-display-xl text-display-xl-mobile text-white animate-rise">Benar!</h1>

        <!-- Points -->
        <div class="mt-3 animate-rise delay-1">
            <p class="font-display text-display tabular-nums text-white leading-none">+850</p>
            <p class="font-label text-label text-white/80 mt-1 uppercase tracking-wide">poin</p>
        </div>

        <!-- Speed bonus -->
        <p class="mt-3 font-headline-2 text-headline-2 text-white animate-rise delay-2">Jawaban cepat! 🔥</p>

        <!-- Standing card -->
        <div class="mt-9 w-full max-w-sm rounded-2xl bg-white/15 backdrop-blur-md ring-1 ring-white/20 p-6 shadow-xl shadow-black/10 animate-rise delay-3">
            <p class="font-label text-label text-white/75 uppercase tracking-wide">Peringkat</p>
            <div class="mt-2 flex items-end justify-center gap-2">
                <span class="font-display-xl text-display-xl tabular-nums text-white leading-none">#4</span>
            </div>
            <div class="mt-4 pt-4 border-t border-white/20">
                <p class="font-display text-display tabular-nums text-white leading-none">2.340</p>
                <p class="font-label text-label text-white/75 mt-1">poin total</p>
            </div>
        </div>

        <!-- Footer caption -->
        <p class="mt-8 font-caption text-caption text-white/70 animate-pulse-soft flex items-center gap-1.5">
            <span class="material-symbols-outlined text-white/70" style="font-size: 18px;">hourglass_top</span>
            Menunggu soal berikutnya
        </p>

    </main>
