<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Online — Hasil Akhir</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#6D28D9",
                    "primary-container": "#5B21B6",
                    "on-primary": "#FFFFFF",
                    "on-primary-container": "#dac5ff",
                    "secondary": "#831ada",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#9e41f5",
                    "bg": "#F8FAFC",
                    "background": "#fef7ff",
                    "surface": "#FFFFFF",
                    "surface-muted": "#F1F5F9",
                    "surface-dim": "#dfd7e5",
                    "surface-bright": "#fef7ff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#f9f1ff",
                    "surface-container": "#f3ebf9",
                    "surface-container-high": "#ede5f3",
                    "surface-container-highest": "#e8e0ee",
                    "surface-variant": "#e8e0ee",
                    "on-surface": "#1d1a24",
                    "on-surface-variant": "#4a4455",
                    "inverse-surface": "#332f39",
                    "inverse-on-surface": "#f6eefc",
                    "outline": "#7b7486",
                    "outline-variant": "#ccc3d7",
                    "border": "#E2E8F0",
                    "text-strong": "#0F172A",
                    "text-muted": "#64748B",
                    "on-background": "#1d1a24",
                    "primary-fixed": "#ebddff",
                    "primary-fixed-dim": "#d3bbff",
                    "inverse-primary": "#d3bbff",
                    "success": "#16A34A",
                    "warning": "#D97706",
                    "info": "#2563EB",
                    "error": "#DC2626",
                    "on-error": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-error-container": "#93000a",
                    "answer-red": "#E21B3C",
                    "answer-blue": "#1368CE",
                    "answer-yellow": "#D89E00",
                    "answer-green": "#26890C",
                    "podium-gold": "#FBBF24",
                    "podium-silver": "#CBD5E1",
                    "podium-bronze": "#D97706"
                },
                borderRadius: {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1rem",
                    "full": "9999px"
                },
                spacing: {
                    "scale-base": "4px",
                    "gutter": "16px",
                    "margin-mobile": "12px",
                    "container-host": "896px",
                    "container-form": "512px"
                },
                fontFamily: {
                    "display": ["Poppins"],
                    "display-xl": ["Poppins"],
                    "display-xl-mobile": ["Poppins"],
                    "headline-1": ["Poppins"],
                    "headline-2": ["Poppins"],
                    "poppins": ["Poppins"],
                    "body": ["Inter"],
                    "label": ["Inter"],
                    "caption": ["Inter"]
                },
                fontSize: {
                    "display-xl": ["60px", {"lineHeight": "60px", "letterSpacing": "0.025em", "fontWeight": "800"}],
                    "display-xl-mobile": ["48px", {"lineHeight": "48px", "fontWeight": "800"}],
                    "display": ["36px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "headline-1": ["24px", {"lineHeight": "30px", "fontWeight": "700"}],
                    "headline-2": ["20px", {"lineHeight": "26px", "fontWeight": "600"}],
                    "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}]
                }
            }
        }
    }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    /* Immersive gameplay background (lobby, gameplay, results, join, participant screens) */
    .hero-gradient { background: linear-gradient(135deg, #6D28D9 0%, #9333EA 50%, #DB2777 100%); }

    /* Screen-specific */
    .ms-fill { font-variation-settings: 'FILL' 1, 'wght' 500, 'GRAD' 0, 'opsz' 48; }
    .tabular-nums { font-variant-numeric: tabular-nums; }

    @keyframes riseUp {
        0%   { transform: translateY(40px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
    }
    .rise { animation: riseUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) both; }

    @keyframes popIn {
        0%   { transform: scale(0.6); opacity: 0; }
        70%  { transform: scale(1.08); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
    }
    .pop { animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    @keyframes floatBob {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-8px); }
    }
    .bob { animation: floatBob 3s ease-in-out infinite; }

    @keyframes sparkle {
        0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.7; }
        50%      { transform: scale(1.3) rotate(15deg); opacity: 1; }
    }
    .sparkle-1 { animation: sparkle 1.8s ease-in-out infinite; }
    .sparkle-2 { animation: sparkle 2.4s ease-in-out infinite 0.4s; }
</style>
</head>
<body class="hero-gradient min-h-dvh text-on-primary font-body antialiased">

    <main class="min-h-dvh flex flex-col items-center justify-center px-6 py-10">
        <div class="w-full max-w-[896px] mx-auto flex flex-col items-center">

            <!-- Heading -->
            <header class="text-center mb-10 rise">
                <div class="flex items-center justify-center gap-3 mb-2">
                    <span class="material-symbols-outlined ms-fill text-podium-gold bob" style="font-size:52px;">trophy</span>
                    <h1 class="font-display-xl text-display-xl text-on-primary">Hasil Akhir</h1>
                </div>
                <p class="text-white/80 text-headline-2 font-display">Selamat kepada para juara!</p>
            </header>

            <!-- Podium -->
            <section class="w-full flex items-end justify-center gap-4 sm:gap-6 mb-12" aria-label="Podium juara">

                <!-- 2nd place — silver — LEFT -->
                <div class="flex flex-col items-center flex-1 max-w-[220px] rise" style="animation-delay:0.25s;">
                    <p class="font-display font-semibold text-white text-headline-2 mb-1 truncate max-w-full">SiPintar</p>
                    <p class="tabular-nums text-white/80 font-display font-bold text-2xl mb-3">4.210</p>
                    <div class="w-full bg-podium-silver rounded-t-2xl shadow-2xl flex flex-col items-center justify-start pt-5 pb-6" style="height:170px;">
                        <span class="material-symbols-outlined ms-fill text-white/90" style="font-size:34px;">military_tech</span>
                        <span class="font-display-xl text-text-strong tabular-nums leading-none mt-1" style="font-size:64px;font-weight:800;">2</span>
                    </div>
                </div>

                <!-- 1st place — gold — CENTER (tallest) -->
                <div class="flex flex-col items-center flex-1 max-w-[240px] pop" style="animation-delay:0.05s;">
                    <div class="relative mb-1">
                        <span class="material-symbols-outlined ms-fill text-podium-gold absolute -top-9 left-1/2 -translate-x-1/2 bob" style="font-size:48px;">crown</span>
                        <span class="material-symbols-outlined ms-fill text-podium-gold absolute -top-6 -left-8 sparkle-1" style="font-size:24px;">auto_awesome</span>
                        <span class="material-symbols-outlined ms-fill text-podium-gold absolute -top-7 -right-8 sparkle-2" style="font-size:20px;">auto_awesome</span>
                        <p class="font-display font-bold text-white text-headline-1 truncate max-w-full">RubahCepat</p>
                    </div>
                    <p class="tabular-nums text-podium-gold font-display font-extrabold text-3xl mb-3">4.850</p>
                    <div class="w-full bg-podium-gold rounded-t-2xl shadow-2xl flex flex-col items-center justify-start pt-6 pb-7 ring-4 ring-white/30" style="height:240px;">
                        <span class="material-symbols-outlined ms-fill text-white" style="font-size:42px;">emoji_events</span>
                        <span class="font-display-xl text-text-strong tabular-nums leading-none mt-1" style="font-size:88px;font-weight:800;">1</span>
                    </div>
                </div>

                <!-- 3rd place — bronze — RIGHT -->
                <div class="flex flex-col items-center flex-1 max-w-[220px] rise" style="animation-delay:0.45s;">
                    <p class="font-display font-semibold text-white text-headline-2 mb-1 truncate max-w-full">Petir</p>
                    <p class="tabular-nums text-white/80 font-display font-bold text-2xl mb-3">3.980</p>
                    <div class="w-full bg-podium-bronze rounded-t-2xl shadow-2xl flex flex-col items-center justify-start pt-5 pb-6" style="height:130px;">
                        <span class="material-symbols-outlined ms-fill text-white/90" style="font-size:30px;">military_tech</span>
                        <span class="font-display-xl text-white tabular-nums leading-none mt-1" style="font-size:56px;font-weight:800;">3</span>
                    </div>
                </div>
            </section>

            <!-- Leaderboard card -->
            <section class="w-full bg-surface text-text-strong rounded-2xl shadow-2xl p-4 sm:p-6 mb-8 rise" style="animation-delay:0.6s;">
                <h2 class="font-display font-semibold text-headline-2 text-text-strong mb-4 flex items-center gap-2">
                    <span class="material-symbols-outlined ms-fill text-primary" style="font-size:24px;">leaderboard</span>
                    Papan Peringkat
                </h2>
                <ul class="flex flex-col gap-2" id="leaderboard"></ul>
            </section>

            <!-- Actions -->
            <div class="w-full flex flex-col sm:flex-row items-center justify-center gap-3 rise" style="animation-delay:0.75s;">
                <button onclick="window.location.href='../host_dashboard_no_sidebar/code.html'" class="w-full sm:w-auto min-h-[44px] bg-surface text-primary font-display font-bold rounded-xl px-8 py-3 shadow-lg hover:bg-surface-muted transition-colors flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined ms-fill" style="font-size:22px;">replay</span>
                    Main Lagi
                </button>
                <button onclick="window.location.href='../host_dashboard_no_sidebar/code.html'" class="w-full sm:w-auto bg-transparent text-white font-display font-semibold border border-white/50 rounded-xl px-5 py-3 hover:bg-white/10 transition-colors flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined" style="font-size:22px;">close</span>
                    Selesai
                </button>
            </div>

        </div>
    </main>

    <script>
        const players = [
            { rank: 1, name: "RubahCepat", score: 4850 },
            { rank: 2, name: "SiPintar",   score: 4210 },
            { rank: 3, name: "Petir",      score: 3980 },
            { rank: 4, name: "KilatBiru",  score: 3540 },
            { rank: 5, name: "MawarHitam", score: 3120 },
            { rank: 6, name: "JagoanKode", score: 2870 },
            { rank: 7, name: "Bintang9",   score: 2410 },
            { rank: 8, name: "AnginRibut", score: 1990 },
        ];

        const tint = {
            1: "bg-podium-gold/15",
            2: "bg-podium-silver/25",
            3: "bg-podium-bronze/15",
        };
        const badge = {
            1: "bg-podium-gold text-text-strong",
            2: "bg-podium-silver text-text-strong",
            3: "bg-podium-bronze text-white",
        };

        const fmt = (n) => n.toLocaleString("id-ID");

        const list = document.getElementById("leaderboard");
        list.innerHTML = players.map((p) => `
            <li class="flex items-center gap-3 rounded-xl px-3 py-2.5 ${tint[p.rank] || "bg-surface-muted"}">
                <span class="flex-none w-8 h-8 rounded-full grid place-items-center font-display font-bold text-label tabular-nums ${badge[p.rank] || "bg-surface-container-high text-text-muted"}">${p.rank}</span>
                <span class="flex-1 font-display font-medium text-body text-text-strong truncate">${p.name}</span>
                <span class="flex-none tabular-nums font-display font-bold text-body text-text-strong">${fmt(p.score)}</span>
            </li>
        `).join("");
    </script>

</body>
</html>
