<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daftar — Quiz Online</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    "primary": "#6D28D9",
                    "primary-container": "#5B21B6",
                    "on-primary": "#FFFFFF",
                    "on-primary-container": "#dac5ff",
                    "secondary": "#831ada",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#9e41f5",
                    "bg": "#F8FAFC",
                    "background": "#fef7ff",
                    "surface": "#FFFFFF",
                    "surface-muted": "#F1F5F9",
                    "surface-dim": "#dfd7e5",
                    "surface-bright": "#fef7ff",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-low": "#f9f1ff",
                    "surface-container": "#f3ebf9",
                    "surface-container-high": "#ede5f3",
                    "surface-container-highest": "#e8e0ee",
                    "surface-variant": "#e8e0ee",
                    "on-surface": "#1d1a24",
                    "on-surface-variant": "#4a4455",
                    "inverse-surface": "#332f39",
                    "inverse-on-surface": "#f6eefc",
                    "outline": "#7b7486",
                    "outline-variant": "#ccc3d7",
                    "border": "#E2E8F0",
                    "text-strong": "#0F172A",
                    "text-muted": "#64748B",
                    "on-background": "#1d1a24",
                    "primary-fixed": "#ebddff",
                    "primary-fixed-dim": "#d3bbff",
                    "inverse-primary": "#d3bbff",
                    "success": "#16A34A",
                    "warning": "#D97706",
                    "info": "#2563EB",
                    "error": "#DC2626",
                    "on-error": "#ffffff",
                    "error-container": "#ffdad6",
                    "on-error-container": "#93000a",
                    "answer-red": "#E21B3C",
                    "answer-blue": "#1368CE",
                    "answer-yellow": "#D89E00",
                    "answer-green": "#26890C",
                    "podium-gold": "#FBBF24",
                    "podium-silver": "#CBD5E1",
                    "podium-bronze": "#D97706"
                },
                borderRadius: {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1rem",
                    "full": "9999px"
                },
                spacing: {
                    "scale-base": "4px",
                    "gutter": "16px",
                    "margin-mobile": "12px",
                    "container-host": "896px",
                    "container-form": "512px"
                },
                fontFamily: {
                    "display": ["Poppins"],
                    "display-xl": ["Poppins"],
                    "display-xl-mobile": ["Poppins"],
                    "headline-1": ["Poppins"],
                    "headline-2": ["Poppins"],
                    "poppins": ["Poppins"],
                    "body": ["Inter"],
                    "label": ["Inter"],
                    "caption": ["Inter"]
                },
                fontSize: {
                    "display-xl": ["60px", {"lineHeight": "60px", "letterSpacing": "0.025em", "fontWeight": "800"}],
                    "display-xl-mobile": ["48px", {"lineHeight": "48px", "fontWeight": "800"}],
                    "display": ["36px", {"lineHeight": "40px", "fontWeight": "700"}],
                    "headline-1": ["24px", {"lineHeight": "30px", "fontWeight": "700"}],
                    "headline-2": ["20px", {"lineHeight": "26px", "fontWeight": "600"}],
                    "body": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "label": ["14px", {"lineHeight": "20px", "fontWeight": "500"}],
                    "caption": ["12px", {"lineHeight": "16px", "fontWeight": "400"}]
                }
            }
        }
    }
</script>
<style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    /* Immersive gameplay background (lobby, gameplay, results, join, participant screens) */
    .hero-gradient { background: linear-gradient(135deg, #6D28D9 0%, #9333EA 50%, #DB2777 100%); }

    /* Screen-specific styles */
    body { font-family: 'Inter', sans-serif; }
    .font-display { font-family: 'Poppins', sans-serif; }

    @keyframes float {
        0%   { transform: translateY(0) rotate(0deg); }
        50%  { transform: translateY(-28px) rotate(12deg); }
        100% { transform: translateY(0) rotate(0deg); }
    }
    .floaty { animation: float 9s ease-in-out infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.7s linear infinite; }

    @keyframes pop { 0% { transform: scale(0); } 60% { transform: scale(1.25); } 100% { transform: scale(1); } }
    .pop { animation: pop 0.35s ease-out; }
</style>
</head>
<body class="min-h-dvh flex items-center justify-center p-4 bg-primary">

    <!-- Fixed full-screen gradient background with floating decorative shapes -->
    <div class="hero-gradient fixed inset-0 z-0 overflow-hidden" aria-hidden="true">
        <span class="material-symbols-outlined floaty absolute text-white" style="font-size:120px; top:8%; left:10%; opacity:0.15; animation-delay:0s;">change_history</span>
        <span class="material-symbols-outlined floaty absolute text-white" style="font-size:90px; top:18%; right:12%; opacity:0.15; animation-delay:1.5s; font-variation-settings:'FILL' 1;">circle</span>
        <span class="material-symbols-outlined floaty absolute text-white" style="font-size:140px; bottom:12%; left:14%; opacity:0.15; animation-delay:3s; font-variation-settings:'FILL' 1;">square</span>
        <span class="material-symbols-outlined floaty absolute text-white" style="font-size:110px; bottom:16%; right:10%; opacity:0.15; animation-delay:2.2s;">pentagon</span>
        <span class="material-symbols-outlined floaty absolute text-white" style="font-size:70px; top:48%; left:46%; opacity:0.15; animation-delay:4s;">circle</span>
    </div>

    <div class="relative z-10 w-full max-w-[480px]">

        <!-- Card -->
        <div class="bg-surface rounded-2xl shadow-xl p-8 md:p-12">

            <!-- Brand header -->
            <div class="flex flex-col items-center text-center">
                <div class="flex items-center gap-3">
                    <div class="bg-primary-container p-3 rounded-xl flex items-center justify-center">
                        <span class="material-symbols-outlined text-on-primary-container" style="font-size:32px; font-variation-settings:'FILL' 1;">quiz</span>
                    </div>
                    <span class="font-display text-primary text-headline-1 font-bold">Quiz Online</span>
                </div>
                <p class="text-on-surface-variant text-sm mt-3">Masuki arena tantangan sekarang!</p>
            </div>

            <!-- Title -->
            <div class="mt-8">
                <h2 class="font-display text-text-strong text-headline-1 font-bold">Buat Akun</h2>
                <p class="text-text-muted text-sm mt-1">Lengkapi data diri Anda untuk memulai.</p>
            </div>

            <!-- Form -->
            <form id="registerForm" class="mt-6 space-y-5" novalidate>

                <!-- Nama Lengkap -->
                <div>
                    <label for="nama" class="block text-label font-semibold text-on-surface mb-1.5">Nama Lengkap</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-size:22px;">person</span>
                        <input id="nama" name="nama" type="text" autocomplete="name"
                            class="w-full bg-surface-container-low rounded-xl border-2 border-transparent pl-11 pr-4 py-3 text-on-surface placeholder:text-outline focus:border-primary/30 focus:ring-4 focus:ring-primary/10 focus:outline-none transition"
                            placeholder="Masukkan nama lengkap Anda">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label for="email" class="block text-label font-semibold text-on-surface mb-1.5">Email</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-size:22px;">mail</span>
                        <input id="email" name="email" type="email" autocomplete="email"
                            class="w-full bg-surface-container-low rounded-xl border-2 border-transparent pl-11 pr-4 py-3 text-on-surface placeholder:text-outline focus:border-primary/30 focus:ring-4 focus:ring-primary/10 focus:outline-none transition"
                            placeholder="contoh@email.com">
                    </div>
                </div>

                <!-- Kata Sandi -->
                <div>
                    <label for="password" class="block text-label font-semibold text-on-surface mb-1.5">Kata Sandi</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline pointer-events-none" style="font-size:22px;">lock</span>
                        <input id="password" name="password" type="password" autocomplete="new-password"
                            class="w-full bg-surface-container-low rounded-xl border-2 border-transparent pl-11 pr-12 py-3 text-on-surface placeholder:text-outline focus:border-primary/30 focus:ring-4 focus:ring-primary/10 focus:outline-none transition"
                            placeholder="Minimal 8 karakter">
                        <button type="button" id="togglePassword" aria-label="Tampilkan kata sandi"
                            class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-lg text-outline hover:text-primary hover:bg-primary/5 transition flex items-center justify-center">
                            <span class="material-symbols-outlined" id="togglePasswordIcon" style="font-size:22px;">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" id="submitBtn"
                    class="w-full bg-primary text-white rounded-xl px-5 py-3 font-semibold min-h-[44px] flex items-center justify-center gap-2 hover:bg-primary-container active:scale-[0.99] focus:ring-4 focus:ring-primary/20 focus:outline-none transition">
                    <span id="submitLabel" class="flex items-center gap-2">
                        Daftar
                        <span class="material-symbols-outlined" style="font-size:20px;">arrow_forward</span>
                    </span>
                    <span id="submitSpinner" class="hidden material-symbols-outlined spinner" style="font-size:22px;">progress_activity</span>
                    <span id="submitCheck" class="hidden material-symbols-outlined pop" style="font-size:24px; font-variation-settings:'FILL' 1;">check_circle</span>
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-6">
                <div class="h-px flex-1 bg-outline-variant"></div>
                <span class="text-caption text-on-surface-variant">atau</span>
                <div class="h-px flex-1 bg-outline-variant"></div>
            </div>

            <!-- Login link -->
            <p class="text-center text-sm text-on-surface-variant">
                Sudah punya akun?
                <a href="../login_screen/code.html" class="text-primary font-bold hover:underline">Masuk</a>
            </p>
        </div>

        <!-- Footer caption -->
        <p class="text-center text-white/70 text-caption mt-6">© 2026 Quiz Online</p>
    </div>

    <script>
        // Password visibility toggle
        (function () {
            const input = document.getElementById('password');
            const btn = document.getElementById('togglePassword');
            const icon = document.getElementById('togglePasswordIcon');
            btn.addEventListener('click', function () {
                const showing = input.type === 'text';
                input.type = showing ? 'password' : 'text';
                icon.textContent = showing ? 'visibility' : 'visibility_off';
                btn.setAttribute('aria-label', showing ? 'Tampilkan kata sandi' : 'Sembunyikan kata sandi');
            });
        })();

        // Submit micro-interaction: spinner -> check
        (function () {
            const form = document.getElementById('registerForm');
            const btn = document.getElementById('submitBtn');
            const label = document.getElementById('submitLabel');
            const spinner = document.getElementById('submitSpinner');
            const check = document.getElementById('submitCheck');

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                if (btn.disabled) { return; }
                btn.disabled = true;
                btn.classList.add('opacity-90', 'cursor-not-allowed');
                label.classList.add('hidden');
                spinner.classList.remove('hidden');

                setTimeout(function () {
                    spinner.classList.add('hidden');
                    check.classList.remove('hidden');
                    setTimeout(function () {
                        check.classList.add('hidden');
                        label.classList.remove('hidden');
                        btn.disabled = false;
                        btn.classList.remove('opacity-90', 'cursor-not-allowed');
                        window.location.href = '../host_dashboard_no_sidebar/code.html';
                    }, 1400);
                }, 1500);
            });
        })();
    </script>
</body>
</html>
