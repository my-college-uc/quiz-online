<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

                        "surface": "#FFFFFF",
                        "surface-muted": "#F1F5F9",
                        "surface-dim": "#dfd7e5",
                        "surface-bright": "#fef7ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f9f1ff",
                        "surface-container": "#f3ebf9",
                        "surface-container-high": "#ede5f3",
                        "surface-container-highest": "#e8e0ee",
                        "surface-variant": "#e8e0ee",
                        "on-surface": "#1d1a24",
                        "on-surface-variant": "#4a4455",
                        "inverse-surface": "#332f39",

                        "outline": "#7b7486",

                        "answer-green": "#26890C",
                        "podium-gold": "#FBBF24",
                        "podium-silver": "#CBD5E1",
                        "podium-bronze": "#D97706"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",

                    },
                    spacing: {
                        "scale-base": "4px",
                        "gutter": "16px",

                        "container-form": "512px"

                    fontFamily: {

                        "display-xl": ["Poppins"],
                        "display-xl-mobile": ["Poppins"],
                        "headline-1": ["Poppins"],

                        "poppins": ["Poppins"],

                    fontSize: {

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        /* Immersive gameplay background (lobby, gameplay, results, join, participant screens) */
        .hero-gradient { background: linear-gradient(135deg, #6D28D9 0%, #9333EA 50%, #DB2777 100%); }
    </style>
</head>
<body class="font-body">
    <div class="hero-gradient min-h-dvh flex flex-col">
        <!-- Top nav -->
        <nav class="w-full">
            <div class="max-w-container-host mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
                <a href="#" class="font-display font-bold text-2xl text-white drop-shadow-sm">Quiz Online</a>
                <div class="flex items-center gap-2 sm:gap-3">
                    <a href="../login_screen/code.html" class="inline-flex items-center justify-center min-h-[44px] px-4 py-2 rounded-xl font-semibold text-white hover:bg-white/15 transition-colors">Masuk</a>
                    <a href="../register_screen/code.html" class="inline-flex items-center justify-center min-h-[44px] px-4 py-2 rounded-xl font-semibold border-2 border-white text-white hover:bg-white/15 transition-colors">Daftar</a>
                </div>
            </div>
        </nav>

        <!-- Body -->
        <main class="flex-1 flex items-center justify-center px-4 py-8">
            <div class="bg-white/95 backdrop-blur rounded-2xl shadow-xl p-8 md:p-10 w-full max-w-md text-center">
                <h1 class="font-display font-bold text-text-strong text-3xl">Siap untuk bermain?</h1>
                <p class="text-text-muted mt-2">Masukkan PIN Game untuk mulai.</p>

                <form class="mt-8 space-y-4" onsubmit="return false;">
                    <input
                        type="text"
                        inputmode="numeric"
                        maxlength="6"
                        placeholder="000000"
                        autocomplete="off"
                        aria-label="PIN Game"
                        class="w-full text-4xl font-bold tracking-[0.3em] text-center tabular-nums rounded-xl border-2 border-border focus:border-primary focus:ring-2 focus:ring-primary/30 text-text-strong placeholder:text-text-muted/40 py-4 outline-none transition-colors"
                    >
                    <button
                        type="submit"
                        onclick="window.location.href='../participant_join/code.html'"
                        class="w-full inline-flex items-center justify-center min-h-[44px] bg-primary text-white rounded-xl px-5 py-3 font-semibold shadow-sm hover:bg-primary-container transition-colors"
                    >
                        Gabung
                    </button>
                </form>

                <p class="text-text-muted text-sm mt-6">Belum punya PIN? Minta kode ke host kuismu.</p>
            </div>
        </main>

        <!-- Footer -->
        <footer class="w-full px-4 py-6 text-center">
            <p class="text-white/60 text-sm">© 2026 Quiz Online</p>
        </footer>
    </div>

    <script>
        // Restrict PIN input to digits only
        document.querySelector('input[inputmode="numeric"]').addEventListener('input', function (e) {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
